<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeTransfer Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-image: url('https://i.pinimg.com/originals/67/22/3b/67223bae39759531fcf1d54eb308ab36.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.826);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-area {
            border: 2px dashed #a01da0;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f0f0ff;
            border-color: #9000ff;
        }

        input[type="file"] {
            display: none;
        }

        button {
            background: #02140d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        button:hover {
            background: #ab0cfb;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f3b7a1;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        /* Estilos para la vista previa */
        .preview-box {
            background: #f0f0ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
            border: 1px solid #a01da0;
        }

        .preview-box.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .preview-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link {
            background: white;
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            margin: 10px 0;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .file-info {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>
            <img src="https://i.pinimg.com/736x/64/db/c8/64dbc89008fd8af1fd7c1349aa9549fd.jpg" width="100" height="100"
                alt="Decoración">
            WeTransfer Clone
        </h1>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div>📁</div>
            <div>Haz clic para seleccionar un archivo</div>
            <div class="file-info">Máximo 100MB | Expira en 24 horas</div>
        </div>

        <input type="file" id="fileInput">

        <!-- Vista previa del archivo seleccionado -->
        <div id="previewBox" class="preview-box">
            <div id="previewIcon" class="preview-icon">📄</div>
            <strong id="previewName"></strong><br>
            <span id="previewSize"></span><br>
            <span id="previewType"></span>
            <div id="previewImage"></div>
        </div>

        <button onclick="uploadFile()">Subir archivo</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        let selectedFile = null;

        // Función para formatear el tamaño del archivo
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Función para obtener el ícono según el tipo de archivo
        function getFileIcon(type, name) {
            if (type.startsWith('image/')) return;
            if (type.startsWith('video/')) return;
            if (type.startsWith('audio/')) return;
            if (type.includes('pdf')) return;
            if (type.includes('word') || name.includes('.doc')) return;
            if (type.includes('excel') || name.includes('.xls')) return;
            if (type.includes('zip') || type.includes('rar')) return;
            return '📄';
        }

        // Escuchar cuando se selecciona un archivo
        document.getElementById('fileInput').addEventListener('change', function (e) {
            selectedFile = e.target.files[0];

            if (selectedFile) {
                const previewBox = document.getElementById('previewBox');
                const previewName = document.getElementById('previewName');
                const previewSize = document.getElementById('previewSize');
                const previewType = document.getElementById('previewType');
                const previewIcon = document.getElementById('previewIcon');
                const previewImageDiv = document.getElementById('previewImage');

                // Mostrar información del archivo
                previewName.textContent = selectedFile.name;
                previewSize.textContent = formatFileSize(selectedFile.size);
                previewType.textContent = selectedFile.type || 'Tipo desconocido';
                previewIcon.textContent = getFileIcon(selectedFile.type, selectedFile.name);

                // Limpiar vista previa de imagen anterior
                previewImageDiv.innerHTML = '';

                // Si es imagen, mostrar vista previa
                if (selectedFile.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'preview-image';
                        previewImageDiv.appendChild(img);
                    };
                    reader.readAsDataURL(selectedFile);
                }

                // Mostrar la caja de vista previa
                previewBox.classList.add('show');
            } else {
                document.getElementById('previewBox').classList.remove('show');
            }
        });

        // Función para subir el archivo
        async function uploadFile() {
            if (!selectedFile) {
                alert('📁 Por favor, selecciona un archivo primero');
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div style="text-align:center">⏳ Subiendo archivo...</div>';
            resultDiv.classList.add('show');

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('expires_in', 24);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">✅ ¡Archivo subido exitosamente!</div>
                        <div><strong>Token:</strong> <code>${data.token}</code></div>
                        <div><strong>Enlace de descarga:</strong></div>
                        <div class="link">
                            <a href="${data.download_url}" target="_blank">${data.download_url}</a>
                        </div>
                        <div><strong>Expira:</strong> ${new Date(data.expires_at).toLocaleString()}</div>
                      
                    `;

                    // Limpiar después de subir
                    document.getElementById('fileInput').value = '';
                    document.getElementById('previewBox').classList.remove('show');
                    selectedFile = null;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error de conexión: ${error.message}</div>`;
            }
        }
    </script>
</body>

</html>
